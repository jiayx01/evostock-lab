<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720" role="img" aria-labelledby="title desc">
  <title id="title">EvoStock Lab 自进化股票研究闭环</title>
  <desc id="desc">从事实快照、候选筛选、条件式建议、结果结算、无未来复盘到规则验证。通过门槛的规则进入下一轮，未通过的规则保留为候选经验。</desc>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#DCE3EC" stroke-width="1" opacity="0.34"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#18212F" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow-neutral" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#98A5B5"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#11866F"/>
    </marker>
    <style>
      .sans { font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
      .eyebrow { font-size: 14px; font-weight: 600; letter-spacing: 1.4px; }
      .headline { font-size: 34px; font-weight: 650; letter-spacing: 0; }
      .subtitle { font-size: 16px; font-weight: 400; letter-spacing: 0; }
      .step { font-size: 13px; font-weight: 700; letter-spacing: 1px; }
      .card-title { font-size: 23px; font-weight: 650; letter-spacing: 0; }
      .card-subtitle { font-size: 14px; font-weight: 400; letter-spacing: 0; }
      .chip { font-size: 12px; font-weight: 500; letter-spacing: 0; }
      .route { font-size: 14px; font-weight: 600; letter-spacing: 0; }
      .foot { font-size: 13px; font-weight: 500; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1600" height="720" fill="#F6F8FB"/>
  <rect width="1600" height="720" fill="url(#grid)"/>
  <rect x="0" y="0" width="12" height="720" fill="#172131"/>

  <g class="sans">
    <g transform="translate(72 58)">
      <rect x="0" y="0" width="30" height="30" rx="7" fill="#172131"/>
      <path d="M8 10h14M8 15h9M8 20h14" stroke="#55D6BE" stroke-width="2.2" stroke-linecap="round"/>
      <text x="44" y="20" class="eyebrow" fill="#172131">EVOSTOCK LAB</text>
    </g>

    <text x="72" y="132" class="headline" fill="#172131">让每一次判断，都成为下一次判断的证据</text>
    <text x="72" y="164" class="subtitle" fill="#657286">Evidence-first self-evolving stock research loop</text>

    <g transform="translate(1111 70)">
      <rect x="0" y="0" width="128" height="34" rx="17" fill="#EAF2FF" stroke="#BFD4F4"/>
      <circle cx="18" cy="17" r="4" fill="#2D6CDF"/>
      <text x="31" y="22" class="chip mono" fill="#294A7D">APPEND-ONLY</text>
      <rect x="140" y="0" width="142" height="34" rx="17" fill="#E9F8F4" stroke="#B9E4D9"/>
      <circle cx="158" cy="17" r="4" fill="#11866F"/>
      <text x="171" y="22" class="chip mono" fill="#276A5B">NO LOOK-AHEAD</text>
      <rect x="294" y="0" width="122" height="34" rx="17" fill="#FFF4E5" stroke="#EBCF9F"/>
      <circle cx="312" cy="17" r="4" fill="#C47A13"/>
      <text x="325" y="22" class="chip mono" fill="#815718">FAIL CLOSED</text>
    </g>

    <line x1="72" y1="198" x2="1528" y2="198" stroke="#D6DEE8"/>

    <!-- 01 Evidence -->
    <g transform="translate(72 238)" filter="url(#shadow)">
      <rect width="220" height="194" rx="8" fill="#FFFFFF" stroke="#D7E0EA"/>
      <rect width="220" height="6" rx="3" fill="#159A9C"/>
      <rect x="18" y="24" width="40" height="26" rx="6" fill="#E4F7F6"/>
      <text x="29" y="42" class="step mono" fill="#13777A">01</text>
      <text x="18" y="86" class="card-title" fill="#172131">事实快照</text>
      <text x="18" y="112" class="card-subtitle" fill="#657286">只记录当时可见的信息</text>
      <g transform="translate(18 137)">
        <rect width="52" height="26" rx="6" fill="#F0F3F7"/><text x="12" y="18" class="chip" fill="#4B596C">市场</text>
        <rect x="60" width="52" height="26" rx="6" fill="#F0F3F7"/><text x="72" y="18" class="chip" fill="#4B596C">公司</text>
        <rect x="120" width="52" height="26" rx="6" fill="#F0F3F7"/><text x="132" y="18" class="chip" fill="#4B596C">持仓</text>
      </g>
    </g>

    <!-- 02 Research -->
    <g transform="translate(316 238)" filter="url(#shadow)">
      <rect width="220" height="194" rx="8" fill="#FFFFFF" stroke="#D7E0EA"/>
      <rect width="220" height="6" rx="3" fill="#2D6CDF"/>
      <rect x="18" y="24" width="40" height="26" rx="6" fill="#EAF2FF"/>
      <text x="29" y="42" class="step mono" fill="#2D6CDF">02</text>
      <text x="18" y="86" class="card-title" fill="#172131">候选研究</text>
      <text x="18" y="112" class="card-subtitle" fill="#657286">筛选不是买入建议</text>
      <g transform="translate(18 137)">
        <rect width="78" height="26" rx="6" fill="#F0F3F7"/><text x="12" y="18" class="chip" fill="#4B596C">六维评分</text>
        <rect x="86" width="98" height="26" rx="6" fill="#F0F3F7"/><text x="98" y="18" class="chip" fill="#4B596C">多角色审阅</text>
      </g>
    </g>

    <!-- 03 Decision -->
    <g transform="translate(560 238)" filter="url(#shadow)">
      <rect width="220" height="194" rx="8" fill="#FFFFFF" stroke="#D7E0EA"/>
      <rect width="220" height="6" rx="3" fill="#5A5FD7"/>
      <rect x="18" y="24" width="40" height="26" rx="6" fill="#EEEEFC"/>
      <text x="29" y="42" class="step mono" fill="#5358BE">03</text>
      <text x="18" y="86" class="card-title" fill="#172131">条件式建议</text>
      <text x="18" y="112" class="card-subtitle" fill="#657286">动作、条件与反证一起固化</text>
      <g transform="translate(18 137)">
        <rect width="116" height="26" rx="6" fill="#F0F3F7"/>
        <text x="12" y="18" class="chip mono" fill="#4B596C">decision_id</text>
      </g>
    </g>

    <!-- 04 Outcomes -->
    <g transform="translate(804 238)" filter="url(#shadow)">
      <rect width="220" height="194" rx="8" fill="#FFFFFF" stroke="#D7E0EA"/>
      <rect width="220" height="6" rx="3" fill="#D68A23"/>
      <rect x="18" y="24" width="40" height="26" rx="6" fill="#FFF4E5"/>
      <text x="29" y="42" class="step mono" fill="#A66C1B">04</text>
      <text x="18" y="86" class="card-title" fill="#172131">结果结算</text>
      <text x="18" y="112" class="card-subtitle" fill="#657286">真实成交与反事实分开计算</text>
      <g transform="translate(18 137)">
        <rect width="184" height="26" rx="6" fill="#F0F3F7"/>
        <text x="12" y="18" class="chip mono" fill="#4B596C">1H · CLOSE · 1/5/20D</text>
      </g>
    </g>

    <!-- 05 Review -->
    <g transform="translate(1048 238)" filter="url(#shadow)">
      <rect width="220" height="194" rx="8" fill="#FFFFFF" stroke="#D7E0EA"/>
      <rect width="220" height="6" rx="3" fill="#C45C66"/>
      <rect x="18" y="24" width="40" height="26" rx="6" fill="#FCECEF"/>
      <text x="29" y="42" class="step mono" fill="#A84D57">05</text>
      <text x="18" y="86" class="card-title" fill="#172131">无未来复盘</text>
      <text x="18" y="112" class="card-subtitle" fill="#657286">按错误类型积累候选经验</text>
      <g transform="translate(18 137)">
        <rect width="184" height="26" rx="6" fill="#F0F3F7"/>
        <text x="12" y="18" class="chip" fill="#4B596C">实际 vs 持有 vs 建议</text>
      </g>
    </g>

    <!-- 06 Validation -->
    <g transform="translate(1292 238)" filter="url(#shadow)">
      <rect width="236" height="194" rx="8" fill="#172131" stroke="#172131"/>
      <rect width="236" height="6" rx="3" fill="#55D6BE"/>
      <rect x="18" y="24" width="40" height="26" rx="6" fill="#263447"/>
      <text x="29" y="42" class="step mono" fill="#75E1CC">06</text>
      <text x="18" y="86" class="card-title" fill="#FFFFFF">规则验证</text>
      <text x="18" y="112" class="card-subtitle" fill="#B7C2CF">证据足够，才允许晋级</text>
      <g transform="translate(18 132)">
        <text x="0" y="12" class="chip" fill="#DCE4EC">20+ 独立信号</text>
        <circle cx="116" cy="8" r="2" fill="#55D6BE"/>
        <text x="126" y="12" class="chip" fill="#DCE4EC">时序留出</text>
        <text x="0" y="38" class="chip" fill="#DCE4EC">交易成本后改善</text>
        <circle cx="116" cy="34" r="2" fill="#55D6BE"/>
        <text x="126" y="38" class="chip" fill="#DCE4EC">回撤不恶化</text>
      </g>
    </g>

    <!-- Main arrows -->
    <g stroke="#98A5B5" stroke-width="2" fill="none" marker-end="url(#arrow-neutral)">
      <path d="M296 335 H307"/>
      <path d="M540 335 H551"/>
      <path d="M784 335 H795"/>
      <path d="M1028 335 H1039"/>
      <path d="M1272 335 H1283"/>
    </g>

    <!-- Promotion loop -->
    <path d="M1410 432 V518 Q1410 536 1392 536 H448 Q426 536 426 514 V444" fill="none" stroke="#11866F" stroke-width="3" marker-end="url(#arrow-green)"/>
    <g transform="translate(710 515)">
      <rect width="326" height="42" rx="8" fill="#E9F8F4" stroke="#B9E4D9"/>
      <circle cx="22" cy="21" r="6" fill="#11866F"/>
      <path d="M19 21l2 2 4-5" fill="none" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="40" y="27" class="route" fill="#276A5B">通过：规则晋级，进入下一轮研究</text>
    </g>

    <!-- Hold branch -->
    <path d="M1410 432 V622 H1230" fill="none" stroke="#A9B4C2" stroke-width="2" stroke-dasharray="7 7" marker-end="url(#arrow-neutral)"/>
    <g transform="translate(774 596)">
      <rect width="438" height="52" rx="8" fill="#FFFFFF" stroke="#D7E0EA"/>
      <rect x="14" y="13" width="54" height="26" rx="6" fill="#F0F3F7"/>
      <text x="25" y="31" class="chip mono" fill="#657286">HOLD</text>
      <text x="84" y="32" class="route" fill="#4B596C">未通过：保留候选经验，不污染生效规则</text>
    </g>

    <g transform="translate(72 656)">
      <line x1="0" y1="0" x2="1456" y2="0" stroke="#D6DEE8"/>
      <text x="0" y="30" class="foot" fill="#657286">NOT A PRICE PREDICTION MODEL</text>
      <circle cx="260" cy="25" r="2" fill="#98A5B5"/>
      <text x="276" y="30" class="foot" fill="#657286">NO AUTOMATIC TRADING</text>
      <text x="1456" y="30" text-anchor="end" class="foot mono" fill="#172131">EVIDENCE → DECISION → OUTCOME → LEARNING</text>
    </g>
  </g>
</svg>
